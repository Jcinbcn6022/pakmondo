<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App description (used by browsers, search engines, link previews) -->
    <meta name="description" content="A field journal for adventure travelers. Track your gear, build reusable kits, plan trips, and never forget the rain jacket again." />

    <!-- Browser tab favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- iOS Add-to-Home-Screen icons (multiple sizes for different devices) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png" />

    <!-- iOS web-app behavior: full-screen, no Safari chrome, custom title -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PakMondo" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Browser theme + PWA manifest -->
    <meta name="theme-color" content="#2D4A3E" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (link previews for iMessage, WhatsApp, Slack, Twitter, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PakMondo — Pack for the trip, not the panic." />
    <meta property="og:description" content="A field journal for adventure travelers. Track gear, build reusable kits, plan trips, never forget the rain jacket." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:url" content="https://pakmondo.com" />
    <meta property="og:site_name" content="PakMondo" />

    <!-- Twitter Card (specifically for X / Twitter) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PakMondo — Pack for the trip, not the panic." />
    <meta name="twitter:description" content="A field journal for adventure travelers." />
    <meta name="twitter:image" content="/icon-512.png" />

    <title>PakMondo — Pack for the trip, not the panic.</title>
  </head>
  <body style="margin: 0; background: #EFE7D6;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
